<style>

  
[data-theme="light"] {
  --bg:       #ffffff;

  --border:   #ebebeb;
  --ink:      #111111;
  --mid:      #555555;
  --light:    #999999;
  --accent:   #ff9900;
  --accent-d: #e47911;
  --shadow:   0 2px 12px rgba(0,0,0,.07);
  --shadow-h: 0 8px 28px rgba(0,0,0,.12);
}

[data-theme="dark"] {
  --bg:       #0f0f0f;
  --bg-soft:  #1a1a1a;
  --bg-card:  #1e1e1e;
  --border:   #2a2a2a;
  --ink:      #f0f0f0;
  --mid:      #aaaaaa;
  --light:    #666666;
  --accent:   #ff9900;
  --accent-d: #ffa724;
  --shadow:   0 2px 12px rgba(0,0,0,.4);
  --shadow-h: 0 8px 28px rgba(0,0,0,.6);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.6;
  transition: background .25s, color .25s;
}

a { text-decoration: none; color: inherit; }
img { display: block; max-width: 100%; }

/* NAV */
nav {
  position: sticky; top: 0; z-index: 100;
  background: var(--bg); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 5vw; height: 62px;
  transition: background .25s, border-color .25s;
}
.logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; letter-spacing: -1px; }
.logo span { color: var(--accent); }
.nav-links { display: flex; gap: 1.5rem; }
.nav-links a { font-size: .85rem; font-weight: 500; color: var(--mid); transition: color .2s; }
.nav-links a:hover { color: var(--ink); }
.theme-toggle {
  width: 38px; height: 38px; border-radius: 50%;
  border: 1.5px solid var(--border); background: var(--bg-soft);
  cursor: pointer; font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  transition: border-color .2s;
}
.theme-toggle:hover { border-color: var(--accent); }

/* HERO */
.hero {
  background: var(--bg-soft); padding: 60px 5vw 56px;
  text-align: center; border-bottom: 1px solid var(--border);
}
.hero-eyebrow {
  display: inline-block; background: var(--accent); color: #fff;
  font-size: .7rem; font-weight: 700; letter-spacing: .1em;
  text-transform: uppercase; padding: 4px 12px; border-radius: 100px; margin-bottom: 1.25rem;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3.8rem); font-weight: 900;
  letter-spacing: -2px; line-height: 1.05; margin-bottom: 1rem;
}
.hero h1 em { font-style: italic; color: var(--accent); }
.hero p { font-size: 1rem; color: var(--mid); max-width: 500px; margin: 0 auto 2rem; }
.hero-cta {
  display: inline-flex; align-items: center; gap: .6rem;
  background: var(--accent); color: #fff;
  font-size: .9rem; font-weight: 700; padding: 13px 28px; border-radius: 10px;
  transition: background .2s, transform .2s;
}
.hero-cta:hover { background: var(--accent-d); transform: translateY(-2px); }

/* SECTIONS */
.section { padding: 56px 5vw; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
}
.section-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.4rem, 2.5vw, 2rem); font-weight: 900; letter-spacing: -1px;
}

/* FILTER */
.filter-bar { display: flex; gap: .4rem; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 15px; border-radius: 100px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--mid); font-size: .78rem; font-weight: 500;
  cursor: pointer; transition: all .2s; font-family: 'Inter', sans-serif;
}
.filter-btn:hover { border-color: var(--accent); color: var(--accent); }
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* GRID */
.products-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 1.25rem;
}

/* CARD */
.product-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 14px; overflow: hidden;
  transition: transform .22s, box-shadow .22s, border-color .22s;
  display: flex; flex-direction: column;
}
.product-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-h); border-color: var(--accent); }

.product-img {
  aspect-ratio: 1 / 1; background: var(--bg-soft);
  overflow: hidden; position: relative;
}
.product-img img { width: 100%; height: 100%; object-fit: cover; transition: transform .35s; }
.product-card:hover .product-img img { transform: scale(1.04); }

.badge {
  position: absolute; top: 10px; left: 10px;
  font-size: .62rem; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; padding: 3px 8px; border-radius: 100px; color: #fff;

.badge-hot { background: #ef4444; }
.badge-new { background: #22c55e; }
.badge-top { background: #8b5cf6; }

.discount-bubble {
  position: absolute; top: 10px; right: 10px;
  background: var(--accent); color: #fff;
  font-size: .65rem; font-weight: 700; padding: 4px 7px; border-radius: 8px;
}

.product-body { padding: 1rem; display: flex; flex-direction: column; flex: 1; gap: .4rem; }
.product-brand { font-size: .68rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em; color: var(--light); }
.product-name { font-size: .88rem; font-weight: 600; color: var(--ink); line-height: 1.35; }

.stars { display: flex; align-items: center; gap: .3rem; font-size: .75rem; color: var(--accent); }
.stars .count { color: var(--light); font-size: .7rem; }

.price-row { display: flex; align-items: baseline; gap: .4rem; flex-wrap: wrap; }
.price-now { font-size: 1.1rem; font-weight: 700; }
.price-was { font-size: .78rem; color: var(--light); text-decoration: line-through; }

.btn-amazon {
  display: flex; align-items: center; justify-content: center; gap: .5rem;
  background: var(--accent); color: #fff;
  font-size: .8rem; font-weight: 700; padding: 9px 14px; border-radius: 8px;
  margin-top: auto; transition: background .2s, transform .15s; font-family: 'Inter', sans-serif;
}
.btn-amazon:hover { background: var(--accent-d); transform: translateY(-1px); }
.amz-logo { font-size: .65rem; opacity: .85; font-weight: 400; }

/* BANNER */
.banner {
  margin: 0 5vw;
  background: linear-gradient(135deg, #ff9900 0%, #e47911 100%);
  border-radius: 16px; padding: 2.5rem 3rem;
  display: flex; align-items: center; justify-content: space-between;
  gap: 2rem; flex-wrap: wrap;

.banner h3 { font-family: 'Playfair Display', serif; font-size: clamp(1.2rem, 2.5vw, 1.8rem); font-weight: 900; color: #fff; letter-spacing: -.5px; margin-bottom: .4rem; }

  .banner { padding: 1.75rem; }

/* ── Build a single product card ── */
function buildCard(p, showFilter) {
  const badgeHTML = p.badge
    ? `<span class="badge badge-${p.badge}">${p.badge}</span>` : '';

  const discountHTML = p.discount
    ? `<span class="discount-bubble">${p.discount}</span>` : '';

  const originalHTML = p.originalPrice
    ? `<span class="price-was">${p.originalPrice}</span>` : '';

  return `
    <div class="product-card" data-tag="${p.tag}">
      <div class="product-img">
        <img src="${p.image}" alt="${p.name}" loading="lazy">
        ${badgeHTML}
        ${discountHTML}
      </div>
      <div class="product-body">
        <div class="product-brand">${p.brand}</div>
        <div class="product-name">${p.name}</div>
        <div class="stars">${p.stars} <span class="count">(${p.reviews})</span></div>
        <div class="price-row">
          <span class="price-now">${p.price}</span>
          ${originalHTML}
        </div>
        <a href="${p.link}" target="_blank" rel="noopener" class="btn-amazon">
          Buy on Amazon <span class="amz-logo">amazon</span>
        </a>
      </div>
    </div>`;
}

/* ── Build a full section ── */
function buildSection(sec) {
  const filterHTML = sec.filter ? `
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterCards('all', this, '${sec.id}')">All</button>
      <button class="filter-btn" onclick="filterCards('men', this, '${sec.id}')">Men</button>
      <button class="filter-btn" onclick="filterCards('women', this, '${sec.id}')">Women</button>
      <button class="filter-btn" onclick="filterCards('unisex', this, '${sec.id}')">Unisex</button>
    </div>` : '';

  const cardsHTML = sec.products.map(p => buildCard(p)).join('');

  return `
    <section class="section" id="${sec.id}">
      <div class="section-header">
        <h2>${sec.title}</h2>
        ${filterHTML}
      </div>
      <div class="products-grid" id="grid-${sec.id}">
        ${cardsHTML}
      </div>
    </section>`;
}

/* ── Build the mid-page banner ── */
function buildBanner() {
  const b = SITE_CONFIG.banner;
  return `
    <div class="banner">
      <div>
        <h3>${b.title}</h3>
        <p>${b.subtitle}</p>
      </div>
      <a href="${b.link}" target="_blank" rel="noopener" class="btn-banner">${b.btnText}</a>
    </div>`;
}

/* ── Inject everything into the page ── */
function buildPage() {
  const cfg = SITE_CONFIG;

  /* <title> */
  document.title = `${cfg.name} — ${cfg.tagline}`;

  /* Logo (nav + footer) */
  const logoHTML = `${cfg.name}<span>.</span>`;
  document.getElementById('siteLogo').innerHTML  = logoHTML;
  document.getElementById('footerLogo').innerHTML = logoHTML;

  /* Nav links from section ids */
  document.getElementById('navLinks').innerHTML =
    SECTIONS.map(s => `<a href="#${s.id}">${s.title.replace(/^[^\w]*/, '')}</a>`).join('');

  /* Hero */
  document.getElementById('heroEyebrow').textContent  = cfg.eyebrow;
  document.getElementById('heroTitle').innerHTML      = cfg.heroTitle;
  document.getElementById('heroSubtitle').textContent = cfg.heroSub;

  /* Sections — inject banner after first section */
  let html = '';
  SECTIONS.forEach((sec, i) => {
    html += buildSection(sec);
    if (i === 0) html += buildBanner();
  });
  document.getElementById('allSections').innerHTML = html;

  /* Footer */
  document.getElementById('footerDesc').textContent    = cfg.footerDesc;
  document.getElementById('footerCopy').textContent    = cfg.copyright;
  document.getElementById('affiliateNote').textContent = cfg.affiliateNote;
  document.getElementById('footerBrowse').innerHTML =
    SECTIONS.map(s => `<li><a href="#${s.id}">${s.title.replace(/^[^\w]*/, '')}</a></li>`).join('');
}

/* ── Filter cards (for sections with filter: true) ── */
function filterCards(tag, btn, sectionId) {
  const grid = document.getElementById('grid-' + sectionId);
  grid.querySelectorAll('.product-card').forEach(card => {
    card.style.display = (tag === 'all' || card.dataset.tag === tag) ? 'flex' : 'none';
  });
  /* Reset all filter buttons in this section, activate clicked one */
  btn.closest('.filter-bar').querySelectorAll('.filter-btn')
    .forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

/* ── Dark / Light toggle ── */
function toggleTheme() {
  const html = document.documentElement;
  const btn  = document.getElementById('themeBtn');
  const dark = html.getAttribute('data-theme') !== 'dark';
  html.setAttribute('data-theme', dark ? 'dark' : 'light');
  btn.textContent = dark ? '☀️' : '🌙';
  localStorage.setItem('pixelt_theme', dark ? 'dark' : 'light');
}

/* Remember theme */
(function () {
  if (localStorage.getItem('pixelt_theme') === 'dark') {
    document.documentElement.setAttribute('data-theme', 'dark');
    document.getElementById('themeBtn').textContent = '☀️';
  }
})();

/* ── Boot ── */
buildPage();

</script>
</body>
</html>
